<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar ">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Post-App</span>

<div class="d-flex" role="search">
        <input class="form-control me-2" id="searchInput" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn search-btn" onclick="searchBar()" type="submit">Search</button>
</div>


        <button id="logoutBtn" onclick="showProfile()" type="button">logout</button>
<div id="profileBox" style="display: none;">
  <p id="userEmail"></p>
  <button id="signoutBtn" onclick="logout()">logout</button>
</div>
     </div>
</nav>


    <div class="container" id="container">
        <div class="row">
            
                <div class="col-sm-12 col-md-6 col-lg-4">
                    <div class="card p-3 m-2">
                       
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label" id="title-text">title:</label>
    <input type="text" class="form-control" id="title" aria-describedby="emailHelp">
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label" id="desc-text">description:</label>
  <textarea
                class="form-control"
                id="description"
                rows="3"
              ></textarea>
</div>
<div class="mb-3 d-flex images justify-content-around">
<img class="bg-img" onclick= "selectImg('./images/img1.jpg')" src="./images/img1.jpg" alt="">
<img class="bg-img" onclick= "selectImg('./images/img2.jpg')" src="./images/img2.jpg" alt="">
<img class="bg-img" onclick= "selectImg('./images/img3.jpg')" src="./images/img3.jpg" alt="">
<img class="bg-img" onclick= "selectImg('./images/img4.avif')" src="./images/img4.avif" alt="">
<img class="bg-img" onclick= "selectImg('./images/img5.png')" src="./images/img5.png" alt="">

<button class="btn-btn-success ms-auto mt-2">
<label class="upload-btn"  for="imgInput">Upload Image</label>
</button>
       <!-- <input type="file" id="imgInput" accept="image/*"> -->

<label for="background-img" class="imgbtn">
  <i class="fa-solid fa-plus" id="iconImg"></i>
</label>
<input type="file" id="background-img" class="d-none" accept="images/*">
</div>
<button onclick="post()" type="submit" class="btn btn-primary ms-auto mt-2"
>Post</button>
        </div>
      </div>


<div class="col-sm-12 col-md-6 col-lg-8">
          <div id="posts" class="posts m-2"></div>
        </div>
      </div>
    </div>

            

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
