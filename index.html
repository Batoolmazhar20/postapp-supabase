 <!DOCTYPE html>
<html>
<head>
  <title>Authentication</title>
  <link rel="stylesheet" href="auth.css" />
</head>

<body>

<div class="main">
  <input type="checkbox" id="toggleAuth" aria-hidden="true" />

  <!-- signup -->
  <div class="signupBox">
    <form id="signupFormNew">
      <!-- <label for="toggleAuth">Create Account</label> -->

<h2 class="mainheading">Access your account</h2>
      <p class="switch">
  Already have an account?


  <label for="toggleAuth">login</label>
   

</p>
      <input type="text" id="signupUsername" placeholder="Username" required />
      <input type="email" id="signupEmail" placeholder="Email" required />
      <input type="password" id="signupPassword" placeholder="Password" required />

      <button onclick="signUpWithGoogle()"><img height="19px" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Google_Favicon_2025.svg/960px-Google_Favicon_2025.svg.png" alt=""> Continue with Google</button>

      <button type="submit">signup</button>
    </form>
  </div>

  <!-- login -->
  <div class="loginBox" id="loginBox">
    <form id="loginFormNew">
      <!-- <label for="toggleAuth">Welcome Back</label> -->

      <h2 class="mainheading">Create Your Account</h2>
      <p class="switch">
  Don't have an account?

  <label for="toggleAuth">signup</label>
</p>
      <input type="email" id="loginEmailNew" placeholder="Email" required />
      <input type="password" id="loginPasswordNew" placeholder="Password" required />

       <button onclick="signUpWithGoogle()"><img height="19px" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Google_Favicon_2025.svg/960px-Google_Favicon_2025.svg.png" alt=""> Continue with Google</button>

      <button type="submit">Login</button>
    </form>
  </div>

</div>


<script type="module" src="auth.js"></script>
</body>
</html>
